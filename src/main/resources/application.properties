# --- Datasource ---
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/metabion}
spring.datasource.username=${DB_USERNAME:metabion}
spring.datasource.password=${DB_PASSWORD:changeme}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true

# --- Spring Session JDBC (schema is Flyway-managed, not auto-initialized) ---
spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=never
spring.session.jdbc.table-name=SPRING_SESSION
spring.session.timeout=30m

# --- Cookie hardening ---
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=Strict

# --- Mail (env-driven) ---
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# --- App ---
app.base-url=${APP_BASE_URL:http://localhost:8080}
metabion.security.trust-forwarded-for=${TRUST_FORWARDED_FOR:false}

# --- File storage ---
metabion.storage.local.root=${METABION_STORAGE_ROOT:./var/metabion-storage}
spring.servlet.multipart.max-file-size=${METABION_MAX_UPLOAD_SIZE:10MB}
spring.servlet.multipart.max-request-size=${METABION_MAX_REQUEST_SIZE:100MB}

# --- Logging ---
logging.level.com.metabion=INFO
logging.level.org.springframework.security=INFO
