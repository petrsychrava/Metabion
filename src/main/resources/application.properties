# --- Datasource ---
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/metabion}
spring.datasource.username=${DB_USERNAME:metabion}
spring.datasource.password=${DB_PASSWORD:changeme}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true

# --- Spring Session JDBC (schema is Flyway-managed, not auto-initialized) ---
spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=never
spring.session.jdbc.table-name=SPRING_SESSION
spring.session.timeout=30m

# --- Cookie hardening ---
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=Strict

# --- Mail (env-driven) ---
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# --- App ---
app.base-url=${APP_BASE_URL:http://localhost:8080}
metabion.security.trust-forwarded-for=${TRUST_FORWARDED_FOR:false}

# --- File storage ---
metabion.storage.local.root=${METABION_STORAGE_ROOT:./var/metabion-storage}
spring.servlet.multipart.max-file-size=${METABION_MAX_UPLOAD_SIZE:10MB}
spring.servlet.multipart.max-request-size=${METABION_MAX_REQUEST_SIZE:100MB}
metabion.diet-log-photos.max-file-size=${METABION_DIET_LOG_PHOTO_MAX_FILE_SIZE:10485760}
metabion.diet-log-photos.max-photos-per-log=${METABION_DIET_LOG_PHOTO_MAX_PHOTOS:10}
metabion.diet-log-photos.pending-retention=${METABION_DIET_LOG_PHOTO_PENDING_RETENTION:24h}
metabion.diet-log-photos.cleanup-delay=${METABION_DIET_LOG_PHOTO_CLEANUP_DELAY:PT1H}

# --- Logging ---
logging.level.com.metabion=INFO
logging.level.org.springframework.security=INFO

# --- MCP patient tools ---
metabion.mcp.enabled=${METABION_MCP_ENABLED:false}
metabion.mcp.allowed-localhost-only=${METABION_MCP_LOCALHOST_ONLY:true}
spring.ai.mcp.server.enabled=${METABION_MCP_ENABLED:false}
spring.ai.mcp.server.protocol=STREAMABLE
spring.ai.mcp.server.name=metabion-patient
spring.ai.mcp.server.version=${APP_VERSION:0.0.1-SNAPSHOT}
spring.ai.mcp.server.type=SYNC
spring.ai.mcp.server.annotation-scanner.enabled=true
spring.ai.mcp.server.streamable-http.mcp-endpoint=/api/mcp

# --- MCP OAuth authorization ---
metabion.oauth.issuer=${METABION_OAUTH_ISSUER:${app.base-url}}
metabion.oauth.resource=${METABION_OAUTH_RESOURCE:${app.base-url}/api/mcp}
metabion.oauth.authorization-code-ttl=${METABION_OAUTH_CODE_TTL:PT5M}
metabion.oauth.access-token-ttl=${METABION_OAUTH_ACCESS_TOKEN_TTL:PT1H}
metabion.oauth.client-metadata.enabled=${METABION_OAUTH_CLIENT_METADATA_ENABLED:true}
metabion.oauth.client-metadata.timeout=${METABION_OAUTH_CLIENT_METADATA_TIMEOUT:PT2S}
metabion.oauth.client-metadata.max-bytes=${METABION_OAUTH_CLIENT_METADATA_MAX_BYTES:32768}
metabion.oauth.clients.codex.display-label=Codex
metabion.oauth.clients.codex.redirect-uris=${METABION_OAUTH_CODEX_REDIRECT_URIS:}
metabion.oauth.clients.codex.scopes=${METABION_OAUTH_CODEX_SCOPES:patient:profile:read}
metabion.oauth.clients.claude.display-label=Claude
metabion.oauth.clients.claude.redirect-uris=${METABION_OAUTH_CLAUDE_REDIRECT_URIS:}
metabion.oauth.clients.claude.scopes=${METABION_OAUTH_CLAUDE_SCOPES:patient:profile:read}
