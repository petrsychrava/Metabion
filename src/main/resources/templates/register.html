<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Create account - Metabion')}"></head>
<body>
<main class="page">
    <section class="panel auth-panel">
        <div th:replace="~{layout :: brand}"></div>
        <h1>Create account</h1>
        <p class="muted">Use the email address where you want to receive account notices.</p>

        <form th:action="@{/register}" th:object="${registerForm}" method="post" class="form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="field">
                <label for="email">Email</label>
                <input id="email" type="email" th:field="*{email}" autocomplete="email" required>
                <p class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">Email error</p>
            </div>

            <div class="field">
                <label for="password">Password</label>
                <input id="password" type="password" th:field="*{password}" autocomplete="new-password"
                       minlength="12" maxlength="72" required>
                <p class="hint">Use at least 12 characters.</p>
                <p class="error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">Password error</p>
            </div>

            <button type="submit">Create account</button>
        </form>

        <nav class="links" aria-label="Account links">
            <a th:href="@{/login}">Already have an account?</a>
        </nav>
    </section>
</main>
</body>
</html>
