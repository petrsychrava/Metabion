<!DOCTYPE html>
<html lang="en" th:lang="${htmlLang == null ? 'en' : htmlLang}" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head(#{auth.register.title} + ' - Metabion')}"></head>
<body>
<main class="page">
    <section class="panel auth-panel">
        <div th:replace="~{layout :: brand}"></div>
        <div th:replace="~{layout :: languageSelector('language-form')}"></div>
        <h1 th:text="#{auth.register.title}">Create account</h1>
        <p class="muted" th:text="#{auth.register.description}">
            Use the email address where you want to receive account notices.
        </p>

        <form th:action="@{/register}" th:object="${registerForm}" method="post" class="form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="field">
                <label for="email" th:text="#{auth.login.email}">Email</label>
                <input id="email" type="email" th:field="*{email}" autocomplete="email" required>
                <p class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">Email error</p>
            </div>

            <div class="field">
                <label for="password" th:text="#{auth.login.password}">Password</label>
                <input id="password" type="password" th:field="*{password}" autocomplete="new-password"
                       minlength="12" maxlength="72" required>
                <p class="hint" th:text="#{auth.password.hint}">Use at least 12 characters.</p>
                <p class="error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">Password error</p>
            </div>

            <button type="submit" th:text="#{auth.register.submit}">Create account</button>
        </form>

        <nav class="links" th:attr="aria-label=#{auth.nav.accountLinks}">
            <a th:href="@{/login}" th:text="#{auth.login.title}">Already have an account?</a>
        </nav>
    </section>
</main>
</body>
</html>
