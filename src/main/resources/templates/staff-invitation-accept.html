<!DOCTYPE html>
<html lang="en" th:lang="${htmlLang == null ? 'en' : htmlLang}" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head(#{auth.invitation.title} + ' - Metabion')}"></head>
<body>
<main class="page">
    <section class="panel auth-panel">
        <div th:replace="~{layout :: brand}"></div>
        <form class="language-form" th:action="@{/preferences/language}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <label for="languagePreference" th:text="#{app.language}">Language</label>
            <select id="languagePreference" name="languagePreference" onchange="this.form.submit()">
                <option th:each="language : ${supportedLanguages}"
                        th:value="${language.name()}"
                        th:selected="${currentLanguage?.name() == language.name()}"
                        th:text="#{|language.${language.languageTag()}|}">Language</option>
            </select>
        </form>
        <h1 th:text="#{auth.invitation.title}">Set up staff account</h1>
        <p class="muted">Create your staff account password.</p>
        <p class="error" th:if="${error}" th:text="${error}">Invitation error.</p>

        <form th:action="@{/staff-invitations/accept}" th:object="${form}" method="post" class="form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input type="hidden" th:field="*{token}" th:value="${token}">

            <div class="field">
                <label for="password" th:text="#{auth.login.password}">Password</label>
                <input id="password" type="password" th:field="*{password}" autocomplete="new-password"
                       minlength="12" maxlength="72" required>
                <p class="hint">Use at least 12 characters.</p>
                <p class="error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">Password error</p>
            </div>

            <button type="submit" th:text="#{auth.invitation.submit}">Create staff account</button>
        </form>
    </section>
</main>
</body>
</html>
