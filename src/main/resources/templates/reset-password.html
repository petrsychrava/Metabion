<!DOCTYPE html>
<html lang="en" th:lang="${htmlLang == null ? 'en' : htmlLang}" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head(#{auth.reset.title} + ' - Metabion')}"></head>
<body>
<main class="page">
    <section class="panel auth-panel">
        <div th:replace="~{layout :: brand}"></div>
        <form class="language-form" th:action="@{/preferences/language}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <label for="languagePreference" th:text="#{app.language}">Language</label>
            <select id="languagePreference" name="languagePreference" onchange="this.form.submit()">
                <option th:each="language : ${supportedLanguages}"
                        th:value="${language.name()}"
                        th:selected="${currentLanguage?.name() == language.name()}"
                        th:text="#{|language.${language.languageTag()}|}">Language</option>
            </select>
        </form>
        <h1 th:text="#{auth.reset.title}">Reset password</h1>
        <p class="muted">Create a new password for your Metabion account.</p>

        <form th:action="@{/reset-password}" th:object="${resetPasswordForm}" method="post" class="form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input type="hidden" th:field="*{token}">
            <div class="field">
                <label for="newPassword" th:text="#{auth.login.password}">New password</label>
                <input id="newPassword" type="password" th:field="*{newPassword}" autocomplete="new-password"
                       minlength="12" maxlength="72" required>
                <p class="hint">Use at least 12 characters.</p>
                <p class="error" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}">
                    Password error
                </p>
            </div>
            <button type="submit" th:text="#{auth.reset.submit}">Reset password</button>
        </form>
    </section>
</main>
</body>
</html>
