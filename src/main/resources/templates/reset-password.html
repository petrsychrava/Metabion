<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Choose password - Metabion')}"></head>
<body>
<main class="page">
    <section class="panel auth-panel">
        <div th:replace="~{layout :: brand}"></div>
        <h1>Choose a new password</h1>
        <p class="muted">Create a new password for your Metabion account.</p>

        <form th:action="@{/reset-password}" th:object="${resetPasswordForm}" method="post" class="form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input type="hidden" th:field="*{token}">
            <div class="field">
                <label for="newPassword">New password</label>
                <input id="newPassword" type="password" th:field="*{newPassword}" autocomplete="new-password"
                       minlength="12" maxlength="72" required>
                <p class="hint">Use at least 12 characters.</p>
                <p class="error" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}">
                    Password error
                </p>
            </div>
            <button type="submit">Reset password</button>
        </form>
    </section>
</main>
</body>
</html>
