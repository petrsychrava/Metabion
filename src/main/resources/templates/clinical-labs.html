<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: appShell(#{lab.clinical.page.title}, ${activePath}, ~{::content})}">
<th:block th:fragment="content">
    <header class="app-header"><div><p class="eyebrow">Metabion</p><h1 th:text="#{lab.clinical.page.title}">Patient laboratory results</h1></div>
        <a class="button" th:if="${patientProfileId != null}" th:href="@{/app/clinical/labs/new(patientProfileId=${patientProfileId})}" th:text="#{lab.form.addResult}">Add result</a></header>
    <section class="panel app-panel"><form class="form form-grid" th:action="@{/app/clinical/labs}" method="get">
        <label class="field"><span th:text="#{dietLogs.patient}">Patient</span><select name="patientProfileId"><option value="" th:text="#{dietLogs.selectPatient}">Select patient</option><option th:each="patient : ${patientOptions}" th:value="${patient.id()}" th:selected="${patient.id() == patientProfileId}" th:text="${patient.email()}">p@example.com</option></select></label>
        <label class="field"><span th:text="#{lab.test}">Biomarker</span><select name="testCode"><option th:each="item : ${catalog}" th:value="${item.code()}" th:selected="${item.code() == selectedTestCode}" th:text="${item.label()}">C-reactive protein</option></select></label>
        <label class="field"><span th:text="#{dietLogs.from}">From</span><input type="date" name="from" th:value="${from}"></label><label class="field"><span th:text="#{dietLogs.to}">To</span><input type="date" name="to" th:value="${to}"></label><button type="submit" th:text="#{dietLogs.filter}">Filter</button>
    </form></section>
    <section class="panel app-panel" th:if="${patientProfileId != null}"><div class="lab-trend-wrap" th:utext="${trendSvg}"></div><table class="table"><thead><tr><th th:text="#{lab.table.collectionDate}">Collection date</th><th th:text="#{lab.table.results}">Results</th><th th:text="#{lab.table.actions}">Actions</th></tr></thead><tbody><tr th:each="set : ${resultSets}"><td th:text="${set.collectionDate()}">2026-07-15</td><td><span th:each="result : ${set.results()}" class="lab-value" th:text="${result.label() + ': ' + result.reportedValue() + ' ' + result.reportedUnit()}">C-reactive protein: 5.2 mg/L</span></td><td><a th:href="@{/app/clinical/labs/{id}/edit(id=${set.id()},patientProfileId=${patientProfileId})}" th:text="#{lab.edit}">Edit</a></td></tr><tr th:if="${#lists.isEmpty(resultSets)}"><td colspan="3" th:text="#{lab.empty}">No laboratory results are available for this date range.</td></tr></tbody></table></section>
</th:block></html>
