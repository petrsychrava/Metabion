<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Invite staff - Metabion')}"></head>
<body>
<main class="page">
    <section class="panel auth-panel">
        <div th:replace="~{layout :: brand}"></div>
        <h1>Invite staff</h1>
        <p class="muted">Send an invitation to a clinical staff member.</p>
        <p class="error" th:if="${error}" th:text="${error}">Invitation error.</p>

        <form th:action="@{/admin/staff-invitations}" th:object="${form}" method="post" class="form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="field">
                <label for="email">Email</label>
                <input id="email" type="email" th:field="*{email}" autocomplete="email" required>
                <p class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">Email error</p>
            </div>

            <fieldset class="field">
                <legend>Roles</legend>
                <label th:each="role : ${staffRoles}" th:for="${'role-' + role}">
                    <input type="checkbox" th:id="${'role-' + role}" th:field="*{roles}" th:value="${role}">
                    <span th:text="${role}">PHYSICIAN</span>
                </label>
                <p class="error" th:if="${#fields.hasErrors('roles')}" th:errors="*{roles}">Roles error</p>
            </fieldset>

            <button type="submit">Send invitation</button>
        </form>
    </section>
</main>
</body>
</html>
