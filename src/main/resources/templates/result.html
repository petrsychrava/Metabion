<!DOCTYPE html>
<html lang="en" th:lang="${htmlLang == null ? 'en' : htmlLang}" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head(${title} + ' - Metabion')}"></head>
<body>
<main class="page">
    <section class="panel auth-panel">
        <div th:replace="~{layout :: brand}"></div>
        <div th:replace="~{layout :: languageSelector('language-form')}"></div>
        <h1 th:text="${title}">Result</h1>
        <p class="muted" th:text="${message}">Status message.</p>
        <a class="button-link" th:href="@{${href}}" th:text="${action}">Continue</a>
    </section>
</main>
</body>
</html>
