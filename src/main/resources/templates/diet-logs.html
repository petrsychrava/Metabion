<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: appShell(#{dietLogs.patient.pageTitle}, ${activePath}, ~{::content})}">
<th:block th:fragment="content">
    <style>
        .diet-log-form {
            gap: 20px;
        }

        .diet-log-section {
            display: grid;
            gap: 16px;
        }

        .diet-log-section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .diet-log-section-header h2,
        .meal-card h2,
        .measurement-card h3 {
            margin: 0;
        }

        .diet-log-grid {
            display: grid;
            gap: 16px;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        }

        .diet-log-card,
        .meal-card,
        .measurement-card {
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 18px;
            background: var(--panel);
        }

        .meal-list {
            display: grid;
            gap: 16px;
        }

        .meal-card {
            display: grid;
            gap: 16px;
        }

        .meal-card-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
        }

        .meal-card-fields,
        .measurement-card {
            display: grid;
            gap: 14px;
        }

        .meal-subsection {
            display: grid;
            gap: 12px;
            border-top: 1px solid var(--border);
            padding-top: 14px;
        }

        .photo-reference-row {
            display: grid;
            gap: 10px;
            margin-top: 10px;
        }

        .unit-pill {
            display: inline-flex;
            align-items: center;
            width: fit-content;
            border: 1px solid var(--border);
            border-radius: 999px;
            background: var(--secondary-bg);
            color: var(--muted);
            font-size: 0.9rem;
            font-weight: 700;
            padding: 6px 10px;
        }

        .diet-log-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: flex-end;
        }

        @media (max-width: 520px) {
            .diet-log-card,
            .meal-card,
            .measurement-card {
                padding: 14px;
            }

            .diet-log-section-header,
            .meal-card-header {
                align-items: stretch;
                flex-direction: column;
            }
        }
    </style>

    <header class="app-header">
        <div>
            <p class="eyebrow">Metabion</p>
            <h1 th:text="#{dietLogs.patient.title}">Diet logs</h1>
        </div>
    </header>

    <section class="panel app-panel">
        <form class="form diet-log-form" th:action="@{/app/diet-logs}" th:object="${dietLogForm}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input type="hidden" th:field="*{patientTimezone}">
            <p class="error" th:if="${dietLogError != null}" th:text="${dietLogError}">Diet log error</p>
            <p class="error" th:each="error : ${#fields.errors('*')}" th:text="${error}">Form error</p>

            <section class="diet-log-section diet-log-card">
                <div class="diet-log-section-header">
                    <h2 th:text="#{dietLogs.dailySummary}">Daily summary</h2>
                </div>

                <div class="diet-log-grid">
                    <label class="field"><span th:text="#{dietLogs.logDate}">Date</span>
                        <input type="date" id="logDate" name="logDate"
                               th:value="${dietLogForm.logDate == null ? '' : #temporals.format(dietLogForm.logDate, 'yyyy-MM-dd')}"
                               required>
                    </label>
                    <label class="field"><span th:text="#{dietLogs.adherenceLevel}">Adherence</span>
                        <select th:field="*{adherenceLevel}" required>
                            <option value="" th:text="#{onboarding.select}">Select</option>
                            <option th:each="option : ${adherenceOptions}" th:value="${option}" th:text="${#messages.msg('enum.dietAdherenceLevel.' + option.name())}">Mostly</option>
                        </select>
                    </label>
                    <label class="field"><span th:text="#{dietLogs.appetiteLevel}">Appetite</span>
                        <select th:field="*{appetiteLevel}" required>
                            <option value="" th:text="#{onboarding.select}">Select</option>
                            <option th:each="option : ${appetiteOptions}" th:value="${option}" th:text="${#messages.msg('enum.appetiteLevel.' + option.name())}">Normal</option>
                        </select>
                    </label>
                </div>
                <p class="error" th:if="${#fields.hasErrors('logDate')}" th:errors="*{logDate}">Date error</p>
                <p class="error" th:if="${#fields.hasErrors('adherenceLevel')}" th:errors="*{adherenceLevel}">Adherence error</p>
                <p class="error" th:if="${#fields.hasErrors('appetiteLevel')}" th:errors="*{appetiteLevel}">Appetite error</p>

                <label class="field"><span th:text="#{dietLogs.notes}">Notes</span>
                    <textarea th:field="*{notes}"></textarea>
                </label>
            </section>

            <section class="diet-log-section">
                <div class="diet-log-section-header">
                    <div>
                        <h2 th:text="#{dietLogs.measurements}">Measurements</h2>
                        <p class="hint" th:text="#{dietLogs.unitFromProfile}">Unit from profile</p>
                    </div>
                </div>

                <div class="diet-log-grid">
                    <section class="measurement-card">
                        <h3 th:text="#{dietLogs.glucose}">Glucose</h3>
                        <span class="unit-pill" th:text="${dietLogForm.glucoseUnitPreference == null ? '' : #messages.msg('enum.measurementUnit.' + dietLogForm.glucoseUnitPreference.name())}">mg/dL</span>
                        <label class="field"><span th:text="#{dietLogs.measurementValue}">Value</span>
                            <input type="number" step="0.01" th:field="*{glucoseMeasurement.value}">
                        </label>
                        <label class="field"><span th:text="#{dietLogs.measurementTime}">Time</span>
                            <input type="time" th:field="*{glucoseMeasurement.measuredTime}">
                        </label>
                        <label class="field"><span th:text="#{dietLogs.measurementContext}">Context</span>
                            <select th:field="*{glucoseMeasurement.context}">
                                <option value="" th:text="#{onboarding.select}">Select</option>
                                <option th:each="option : ${measurementContexts}" th:value="${option}" th:text="${#messages.msg('enum.measurementContext.' + option.name())}">Fasting</option>
                            </select>
                        </label>
                        <label class="field"><span th:text="#{dietLogs.measurementNotes}">Measurement notes</span>
                            <textarea th:field="*{glucoseMeasurement.notes}"></textarea>
                        </label>
                    </section>

                    <section class="measurement-card">
                        <h3 th:text="#{dietLogs.ketones}">Ketones</h3>
                        <span class="unit-pill" th:text="#{dietLogs.fixedKetoneUnit}">Ketones are recorded in mmol/L</span>
                        <label class="field"><span th:text="#{dietLogs.measurementValue}">Value</span>
                            <input type="number" step="0.01" th:field="*{ketoneMeasurement.value}">
                        </label>
                        <label class="field"><span th:text="#{dietLogs.measurementTime}">Time</span>
                            <input type="time" th:field="*{ketoneMeasurement.measuredTime}">
                        </label>
                        <label class="field"><span th:text="#{dietLogs.measurementContext}">Context</span>
                            <select th:field="*{ketoneMeasurement.context}">
                                <option value="" th:text="#{onboarding.select}">Select</option>
                                <option th:each="option : ${measurementContexts}" th:value="${option}" th:text="${#messages.msg('enum.measurementContext.' + option.name())}">Bedtime</option>
                            </select>
                        </label>
                        <label class="field"><span th:text="#{dietLogs.measurementNotes}">Measurement notes</span>
                            <textarea th:field="*{ketoneMeasurement.notes}"></textarea>
                        </label>
                    </section>
                </div>
            </section>

            <section class="diet-log-section">
                <div class="diet-log-section-header">
                    <h2 th:text="#{dietLogs.meals}">Meals</h2>
                    <button type="button" class="secondary" data-add-meal th:text="#{dietLogs.addMeal}">Add meal</button>
                </div>

                <div class="meal-list" data-meal-list th:attr="data-caption-label=#{dietLogs.caption}">
                    <section class="meal-card" th:each="meal, row : *{meals}" data-meal-row th:attr="data-meal-index=${row.index}">
                        <div class="meal-card-header">
                            <h2>
                                <span th:text="#{dietLogs.meal}">Meal</span>
                                <span data-meal-number th:text="${row.index + 1}">1</span>
                            </h2>
                            <button type="button" class="secondary" data-remove-meal th:text="#{dietLogs.removeMeal}">Remove meal</button>
                        </div>

                        <div class="meal-card-fields">
                            <div class="diet-log-grid">
                                <label class="field"><span th:text="#{dietLogs.mealType}">Meal type</span>
                                    <select th:field="*{meals[__${row.index}__].mealType}">
                                        <option value="" th:text="#{onboarding.select}">Select</option>
                                        <option th:each="option : ${mealTypes}" th:value="${option}" th:text="${#messages.msg('enum.mealType.' + option.name())}">Lunch</option>
                                    </select>
                                </label>
                                <label class="field"><span th:text="#{dietLogs.foodCategory}">Food category</span>
                                    <select th:field="*{meals[__${row.index}__].foodCategory}">
                                        <option value="" th:text="#{onboarding.select}">Select</option>
                                        <option th:each="option : ${foodCategories}" th:value="${option}" th:text="${#messages.msg('enum.foodCategory.' + option.name())}">Low-carb vegetables</option>
                                    </select>
                                </label>
                            </div>
                            <label class="field"><span th:text="#{dietLogs.foodDescription}">Food description</span>
                                <input th:field="*{meals[__${row.index}__].foodDescription}">
                            </label>
                            <label class="field"><span th:text="#{dietLogs.mealNotes}">Meal notes</span>
                                <textarea th:field="*{meals[__${row.index}__].notes}"></textarea>
                            </label>
                        </div>

                        <section class="meal-subsection">
                            <h3 th:text="#{dietLogs.deviation}">Deviation</h3>
                            <div class="diet-log-grid">
                                <label class="field"><span th:text="#{dietLogs.deviationCategory}">Category</span>
                                    <select th:field="*{meals[__${row.index}__].deviation.deviationCategory}">
                                        <option value="" th:text="#{dietLogs.noDeviation}">No deviation</option>
                                        <option th:each="option : ${deviationCategories}" th:value="${option}" th:text="${#messages.msg('enum.dietDeviationCategory.' + option.name())}">Dining out</option>
                                    </select>
                                </label>
                                <label class="field"><span th:text="#{dietLogs.deviationSeverity}">Severity</span>
                                    <select th:field="*{meals[__${row.index}__].deviation.severity}">
                                        <option value="" th:text="#{onboarding.select}">Select</option>
                                        <option th:each="option : ${deviationSeverities}" th:value="${option}" th:text="${#messages.msg('enum.dietDeviationSeverity.' + option.name())}">Minor</option>
                                    </select>
                                </label>
                            </div>
                            <label class="field"><span th:text="#{dietLogs.deviationNotes}">Deviation notes</span>
                                <textarea th:field="*{meals[__${row.index}__].deviation.notes}"></textarea>
                            </label>
                        </section>

                        <section class="meal-subsection">
                            <h3 th:text="#{dietLogs.mealPhotos}">Photos for this meal</h3>
                            <label class="field"><span th:text="#{dietLogs.uploadMealPhotos}">Upload photos for this meal</span>
                                <input type="file" class="diet-photo-upload" accept="image/jpeg,image/png,image/webp" multiple>
                            </label>
                            <div data-photo-rows>
                                <div class="photo-reference-row" th:each="photoReference, photoRow : ${meal.photoReferences}" data-photo-row>
                                    <input type="hidden" th:field="*{meals[__${row.index}__].photoReferences[__${photoRow.index}__].uploadId}">
                                    <label class="field"><span th:text="#{dietLogs.caption}">Caption</span>
                                        <input th:field="*{meals[__${row.index}__].photoReferences[__${photoRow.index}__].caption}">
                                    </label>
                                </div>
                            </div>
                        </section>
                    </section>
                </div>
            </section>

            <script>
                document.addEventListener('DOMContentLoaded', () => {
                    const mealList = document.querySelector('[data-meal-list]');
                    const addMealButton = document.querySelector('[data-add-meal]');
                    const csrf = document.querySelector('input[name="_csrf"]');
                    if (!mealList) return;

                    const mealRows = () => Array.from(mealList.querySelectorAll('[data-meal-row]'));

                    const updateMealAttributes = (row, mealIndex) => {
                        row.dataset.mealIndex = mealIndex;
                        const number = row.querySelector('[data-meal-number]');
                        if (number) number.textContent = String(mealIndex + 1);

                        row.querySelectorAll('[name]').forEach((element) => {
                            element.name = element.name.replace(/meals\[\d+]/g, `meals[${mealIndex}]`);
                        });
                        row.querySelectorAll('[id]').forEach((element) => {
                            element.id = element.id.replace(/meals\d+/g, `meals${mealIndex}`);
                        });
                        row.querySelectorAll('[for]').forEach((element) => {
                            element.htmlFor = element.htmlFor.replace(/meals\d+/g, `meals${mealIndex}`);
                        });

                        row.querySelectorAll('[data-photo-row]').forEach((photoRow, photoIndex) => {
                            photoRow.querySelectorAll('[name]').forEach((element) => {
                                element.name = element.name.replace(/photoReferences\[\d+]/g, `photoReferences[${photoIndex}]`);
                            });
                            photoRow.querySelectorAll('[id]').forEach((element) => {
                                element.id = element.id.replace(/photoReferences\d+/g, `photoReferences${photoIndex}`);
                            });
                            photoRow.querySelectorAll('[for]').forEach((element) => {
                                element.htmlFor = element.htmlFor.replace(/photoReferences\d+/g, `photoReferences${photoIndex}`);
                            });
                        });
                    };

                    const reindexMeals = () => mealRows().forEach(updateMealAttributes);

                    const resetMealRow = (row) => {
                        row.querySelectorAll('input, select, textarea').forEach((element) => {
                            element.value = '';
                        });
                        const photoRows = Array.from(row.querySelectorAll('[data-photo-row]'));
                        photoRows.slice(1).forEach((photoRow) => photoRow.remove());
                    };

                    addMealButton?.addEventListener('click', () => {
                        const source = mealRows().at(-1);
                        if (!source) return;
                        const clone = source.cloneNode(true);
                        resetMealRow(clone);
                        mealList.appendChild(clone);
                        reindexMeals();
                    });

                    mealList.addEventListener('click', (event) => {
                        const button = event.target.closest('[data-remove-meal]');
                        if (!button) return;
                        const rows = mealRows();
                        const row = button.closest('[data-meal-row]');
                        if (!row) return;
                        if (rows.length === 1) {
                            resetMealRow(row);
                        } else {
                            row.remove();
                        }
                        reindexMeals();
                    });

                    const nextEmptyPhotoRow = (mealRow) => Array.from(mealRow.querySelectorAll('[data-photo-row]'))
                        .find((row) => !row.querySelector('input[name$=".uploadId"]')?.value);

                    const appendPhotoRow = (mealRow, upload) => {
                        let row = nextEmptyPhotoRow(mealRow);
                        if (!row) {
                            const captionLabel = mealList.dataset.captionLabel || 'Caption';
                            const mealIndex = Number(mealRow.dataset.mealIndex || '0');
                            const photoIndex = mealRow.querySelectorAll('[data-photo-row]').length;
                            row = document.createElement('div');
                            row.className = 'photo-reference-row';
                            row.setAttribute('data-photo-row', '');
                            row.innerHTML = `
                                <input type="hidden" name="meals[${mealIndex}].photoReferences[${photoIndex}].uploadId">
                                <label class="field"><span>${captionLabel}</span>
                                    <input name="meals[${mealIndex}].photoReferences[${photoIndex}].caption">
                                </label>`;
                            mealRow.querySelector('[data-photo-rows]').appendChild(row);
                            reindexMeals();
                        }
                        row.querySelector('input[name$=".uploadId"]').value = upload.uploadId;
                    };

                    mealList.addEventListener('change', async (event) => {
                        const input = event.target.closest('.diet-photo-upload');
                        if (!input || !csrf) return;
                        const mealRow = input.closest('[data-meal-row]');
                        if (!mealRow) return;
                        for (const file of input.files) {
                            const formData = new FormData();
                            formData.append('file', file);
                            const response = await fetch('/api/diet-log-photos/uploads', {
                                method: 'POST',
                                headers: {'X-XSRF-TOKEN': csrf.value},
                                body: formData
                            });
                            if (response.ok) {
                                appendPhotoRow(mealRow, await response.json());
                            }
                        }
                        input.value = '';
                    });

                    reindexMeals();
                });
            </script>

            <div class="diet-log-actions">
                <button type="submit" th:text="#{dietLogs.save}">Save log</button>
            </div>
        </form>
    </section>
</th:block>
</html>
