<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: appShell(#{app.account.title}, ${activePath}, ~{::content})}">
<th:block th:fragment="content">
    <header class="app-header">
        <div>
            <p class="eyebrow">Metabion</p>
            <h1 th:text="#{app.account.title}">Account</h1>
            <p class="muted" th:text="#{app.account.description}">
                Review the identity and access details for your signed-in session.
            </p>
        </div>
    </header>

    <section class="panel app-panel">
        <h2 th:text="#{app.account.profile}">Profile</h2>
        <dl class="details">
            <dt th:text="#{app.account.email}">Email</dt>
            <dd th:text="${email}">user@example.com</dd>
            <dt th:text="#{app.account.roles}">Roles</dt>
            <dd>
                <span th:each="role, roleStat : ${roles}">
                    <span th:text="${role}">PATIENT</span><span th:if="${!roleStat.last}">, </span>
                </span>
            </dd>
        </dl>
    </section>

    <section class="panel app-panel" th:if="${patientAccount}">
        <h2 th:text="#{app.account.patientProfile}">Patient profile</h2>
        <form class="form" th:action="@{/app/account/profile}" th:object="${patientProfileForm}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <label class="field"><span th:text="#{onboarding.dateOfBirth}">Date of birth</span>
                <input type="date" id="dateOfBirth" name="dateOfBirth"
                       th:value="${patientProfileForm.dateOfBirth == null ? '' : #temporals.format(patientProfileForm.dateOfBirth, 'yyyy-MM-dd')}"
                       required>
            </label>
            <p class="error"
               th:if="${#ctx.containsVariable('org.springframework.validation.BindingResult.patientProfileForm') and #fields.hasErrors('dateOfBirth')}"
               th:errors="*{dateOfBirth}">Date of birth error</p>
            <label class="field"><span th:text="#{onboarding.sex}">Sex</span>
                <select id="sex" name="sex" required>
                    <option value="" th:text="#{onboarding.select}">Select</option>
                    <option th:each="option : ${sexOptions}"
                            th:value="${option}"
                            th:selected="${patientProfileForm.sex == option}"
                            th:text="${#messages.msg('enum.sex.' + option.name())}"></option>
                </select>
            </label>
            <p class="error"
               th:if="${#ctx.containsVariable('org.springframework.validation.BindingResult.patientProfileForm') and #fields.hasErrors('sex')}"
               th:errors="*{sex}">Sex error</p>
            <label class="field"><span th:text="#{onboarding.countryRegion}">Country/region</span>
                <input id="countryRegion" name="countryRegion" th:value="${patientProfileForm.countryRegion}" required>
            </label>
            <p class="error"
               th:if="${#ctx.containsVariable('org.springframework.validation.BindingResult.patientProfileForm') and #fields.hasErrors('countryRegion')}"
               th:errors="*{countryRegion}">Country error</p>
            <label class="field"><span th:text="#{onboarding.timezone}">Timezone</span>
                <input id="timezone" name="timezone" th:value="${patientProfileForm.timezone}" required>
            </label>
            <p class="error"
               th:if="${#ctx.containsVariable('org.springframework.validation.BindingResult.patientProfileForm') and #fields.hasErrors('timezone')}"
               th:errors="*{timezone}">Timezone error</p>
            <button type="submit" th:text="#{app.account.patientProfile.save}">Save profile</button>
        </form>
    </section>

    <section class="panel app-panel">
        <h2 th:text="#{app.account.preferences}">Preferences</h2>
        <div class="preference-forms">
            <form class="theme-form" th:action="@{/app/preferences/theme}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <label for="themePreference" th:text="#{app.theme}">Theme</label>
                <select id="themePreference" name="themePreference" onchange="this.form.submit()">
                    <option value="SYSTEM" th:selected="${themePreference?.name() == 'SYSTEM'}" th:text="#{theme.system}">System</option>
                    <option value="LIGHT" th:selected="${themePreference?.name() == 'LIGHT'}" th:text="#{theme.light}">Light</option>
                    <option value="DARK" th:selected="${themePreference?.name() == 'DARK'}" th:text="#{theme.dark}">Dark</option>
                </select>
            </form>
            <form class="theme-form" th:if="${patientAccount}" th:action="@{/app/preferences/glucose-unit}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <label for="glucoseUnitPreference" th:text="#{app.account.glucoseUnit}">Glucose unit</label>
                <select id="glucoseUnitPreference" name="glucoseUnitPreference" onchange="this.form.submit()">
                    <option th:each="unit : ${measurementUnits}"
                            th:value="${unit}"
                            th:selected="${glucoseUnitPreference?.name() == unit.name()}"
                            th:text="${#messages.msg('enum.measurementUnit.' + unit.name())}">mg/dL</option>
                </select>
            </form>
            <div th:replace="~{preferences :: languageSelector('theme-form')}"></div>
        </div>
    </section>
</th:block>
</html>
