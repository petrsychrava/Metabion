<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: appShell(#{app.account.title}, ${activePath}, ~{::content})}">
<th:block th:fragment="content">
    <header class="app-header">
        <div>
            <p class="eyebrow">Metabion</p>
            <h1 th:text="#{app.account.title}">Account</h1>
            <p class="muted" th:text="#{app.account.description}">
                Review the identity and access details for your signed-in session.
            </p>
        </div>
    </header>

    <section class="panel app-panel">
        <h2 th:text="#{app.account.profile}">Profile</h2>
        <dl class="details">
            <dt th:text="#{app.account.email}">Email</dt>
            <dd th:text="${email}">user@example.com</dd>
            <dt th:text="#{app.account.roles}">Roles</dt>
            <dd>
                <span th:each="role, roleStat : ${roles}">
                    <span th:text="${role}">PATIENT</span><span th:if="${!roleStat.last}">, </span>
                </span>
            </dd>
        </dl>
    </section>

    <section class="panel app-panel">
        <h2 th:text="#{app.account.preferences}">Preferences</h2>
        <div class="preference-forms">
            <form class="theme-form" th:action="@{/app/preferences/theme}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <label for="themePreference" th:text="#{app.theme}">Theme</label>
                <select id="themePreference" name="themePreference" onchange="this.form.submit()">
                    <option value="SYSTEM" th:selected="${themePreference?.name() == 'SYSTEM'}" th:text="#{theme.system}">System</option>
                    <option value="LIGHT" th:selected="${themePreference?.name() == 'LIGHT'}" th:text="#{theme.light}">Light</option>
                    <option value="DARK" th:selected="${themePreference?.name() == 'DARK'}" th:text="#{theme.dark}">Dark</option>
                </select>
            </form>
            <div th:replace="~{preferences :: languageSelector('theme-form')}"></div>
        </div>
    </section>
</th:block>
</html>
