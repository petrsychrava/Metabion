<!DOCTYPE html>
<html lang="en" th:lang="${htmlLang == null ? 'en' : htmlLang}" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head(#{auth.login.title} + ' - Metabion')}"></head>
<body>
<main class="page">
    <section class="panel auth-panel">
        <div th:replace="~{layout :: brand}"></div>
        <div th:replace="~{layout :: languageSelector('language-form')}"></div>
        <h1 th:text="#{auth.login.title}">Sign in</h1>
        <p class="muted" th:text="#{auth.login.description}">Access your Metabion account.</p>
        <p class="error" th:if="${error}" th:text="${error}">Invalid email or password.</p>

        <form th:action="@{/login}" th:object="${loginForm}" method="post" class="form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <label for="email" th:text="#{auth.login.email}">Email</label>
            <input id="email" type="email" th:field="*{email}" autocomplete="email" required>

            <label for="password" th:text="#{auth.login.password}">Password</label>
            <input id="password" type="password" th:field="*{password}" autocomplete="current-password" required>

            <button type="submit" th:text="#{auth.login.submit}">Sign in</button>
        </form>

        <nav class="links" aria-label="Account links">
            <a th:href="@{/register}" th:text="#{auth.register.title}">Create account</a>
            <a th:href="@{/forgot-password}" th:text="#{auth.forgot.title}">Forgot password?</a>
        </nav>
    </section>
</main>
</body>
</html>
