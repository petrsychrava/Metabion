<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Sign in - Metabion')}"></head>
<body>
<main class="page">
    <section class="panel auth-panel">
        <div th:replace="~{layout :: brand}"></div>
        <h1>Sign in</h1>
        <p class="muted">Access your Metabion account.</p>
        <p class="error" th:if="${error}" th:text="${error}">Invalid email or password.</p>

        <form th:action="@{/login}" th:object="${loginForm}" method="post" class="form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <label for="email">Email</label>
            <input id="email" type="email" th:field="*{email}" autocomplete="email" required>

            <label for="password">Password</label>
            <input id="password" type="password" th:field="*{password}" autocomplete="current-password" required>

            <button type="submit">Sign in</button>
        </form>

        <nav class="links" aria-label="Account links">
            <a th:href="@{/register}">Create account</a>
            <a th:href="@{/forgot-password}">Forgot password?</a>
        </nav>
    </section>
</main>
</body>
</html>
