<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Reset password - Metabion')}"></head>
<body>
<main class="page">
    <section class="panel auth-panel">
        <div th:replace="~{layout :: brand}"></div>
        <h1>Reset password</h1>
        <p class="muted">Enter your email and we will send reset instructions if an account exists.</p>

        <form th:action="@{/forgot-password}" th:object="${forgotPasswordForm}" method="post" class="form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <label for="email">Email</label>
            <input id="email" type="email" th:field="*{email}" autocomplete="email" required>
            <button type="submit">Send reset link</button>
        </form>

        <nav class="links" aria-label="Account links">
            <a th:href="@{/login}">Back to sign in</a>
        </nav>
    </section>
</main>
</body>
</html>
