<!DOCTYPE html>
<html lang="en" th:lang="${htmlLang == null ? 'en' : htmlLang}" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head(#{auth.forgot.title} + ' - Metabion')}"></head>
<body>
<main class="page">
    <section class="panel auth-panel">
        <div th:replace="~{layout :: brand}"></div>
        <div th:replace="~{layout :: languageSelector('language-form')}"></div>
        <h1 th:text="#{auth.forgot.title}">Forgot password</h1>
        <p class="muted" th:text="#{auth.forgot.description}">
            Enter your email and we will send reset instructions if an account exists.
        </p>

        <form th:action="@{/forgot-password}" th:object="${forgotPasswordForm}" method="post" class="form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <label for="email" th:text="#{auth.login.email}">Email</label>
            <input id="email" type="email" th:field="*{email}" autocomplete="email" required>
            <button type="submit" th:text="#{auth.forgot.submit}">Send reset link</button>
        </form>

        <nav class="links" aria-label="Account links">
            <a th:href="@{/login}" th:text="#{result.backToSignIn}">Back to sign in</a>
        </nav>
    </section>
</main>
</body>
</html>
